# Windows stack size configuration
[target.'cfg(all(windows, target_env = "msvc"))']
rustflags = ["-C", "link-arg=/STACK:8388608"]

[target.'cfg(all(windows, target_env = "gnu"))']
rustflags = ["-C", "link-arg=-Wl,--stack,8388608"]

# macOS optimization (Intel) - Uncomment after installing lld
# [target.x86_64-apple-darwin]
# rustflags = [
#     "-C", "link-arg=-fuse-ld=lld",
#     "-C", "link-arg=-Wl,-stack_size,0x800000",
# ]

# macOS optimization (Apple Silicon) - Uncomment after installing lld
# [target.aarch64-apple-darwin]
# rustflags = [
#     "-C", "link-arg=-fuse-ld=lld",
#     "-C", "link-arg=-Wl,-stack_size,0x800000",
# ]

# Development profile optimization
[profile.dev]
# Reduce debug info for faster compilation (0=none, 1=line-tables, 2=full)
debug = 1
# Enable incremental compilation (default: true)
incremental = true
# More codegen units = faster compilation but larger binary
codegen-units = 256

# Build configuration
[build]
# Use more parallel jobs (adjust based on your CPU cores)
jobs = 8
